<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Outside | Home</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <header class="divider">
    <div class="logo">
      <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
      <a href="index.html"> Sleep<span class="highlight">Outside</span></a>
    </div>

    <!-- ✅ FIXED CART SECTION (your task) -->
    <div class="cart">
      <a href="cart/index.html">
        <img src="/images/cart.svg" alt="cart icon" class="cart-icon" />
      </a>
    </div>

  </header>

  <main class="divider">
    <div class="hero">
      <img src="/images/banner-sm.jpg" srcset="images/banner-sm.jpg 500w, images/banner.jpg"
        alt="image of a high mountain lake" />
      <div class="logo logo--square">
        <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
        <div>Sleep<span class="highlight">Outside</span></div>
      </div>
      <div class="mission">
        <p>
          Our mission is to provide you with everything you need to sleep
          outside comfortably at an affordable price.
        </p>
      </div>
    </div>

    <section class="products">
      <h2>Top Products</h2>
      <input type="text" id="searchInput" placeholder="Search products..." />
      <ul class="product-list">
        <!-- Product cards here -->
      </ul>
    </section>
  </main>

  <footer>
    &copy;2025 ⛺ SleepOutside ⛺ WDD 330 ⛺ BYU-Idaho for BYU-Pathway Worldwide Online
  </footer>

  <!-- Search script goes here, after all HTML content -->
  <script>
    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function () {
      const filter = searchInput.value.toLowerCase();
      const products = document.querySelectorAll(".product-card");

      products.forEach(product => {
        const name = product.querySelector(".card__name").textContent.toLowerCase();
        product.style.display = name.includes(filter) ? "" : "none";
      });
    });
  </script>

  <!-- ✅ ADDED: Cart animation script (your task) -->
  <script>
    const cartIcon = document.querySelector(".cart-icon");

    if (cartIcon) {
      cartIcon.addEventListener("click", () => {
        cartIcon.classList.add("cart-animate");

        setTimeout(() => {
          cartIcon.classList.remove("cart-animate");
        }, 500);
      });
    }
  </script>

</body>

</html>
